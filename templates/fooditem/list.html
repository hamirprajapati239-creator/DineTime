<h2>Food Items</h2>

<a href="{% url 'fooditem_create' %}">Add Food Item</a>

<table border="1">
<tr>
<th>ID</th>
<th>Name</th>
<th>Price</th>
<th>Action</th>
</tr>

{% for item in items %}
<tr>
<td>{{ item.id }}</td>
<td>{{ item.food_name }}</td>
<td>{{ item.price }}</td>

<td>
<a href="{% url 'fooditem_update' item.id %}">Edit</a>
<a href="{% url 'fooditem_delete' item.id %}">Delete</a>
</td>

</tr>
{% endfor %}

</table>
