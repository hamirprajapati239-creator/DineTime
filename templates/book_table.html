{% load static %}

<!DOCTYPE html>
<html>
<head>

<title>Book Table | DineTime</title>

<link rel="stylesheet" href="{% static 'css/book.css' %}">

</head>

<body>

<section class="booking-section">

<h2>🍽️ Book a Table</h2>

<form method="POST">

{% csrf_token %}

<div class="form-group">
<label>Name</label>
{{ form.name }}
</div>

<div class="form-group">
<label>Email</label>
{{ form.email }}
</div>

<div class="form-group">
<label>Phone</label>
{{ form.phone }}
</div>

<div class="form-group">
<label>Date</label>
{{ form.date }}
</div>

<div class="form-group">
<label>Time</label>
{{ form.time }}
</div>

<div class="form-group">
<label>Guests</label>
{{ form.guests }}
</div>

<button type="submit">Book Now</button>
<a href="{% url 'home' %}">Go back to Home</a>


</form>

</section>

</body>
</html>
