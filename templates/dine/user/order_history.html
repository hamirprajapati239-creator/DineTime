{% extends "base.html" %}

{% block content %}

<h1>Order History</h1>

<table>

<tr>
<th>Order</th>
<th>Date</th>
<th>Total</th>
</tr>

{% for order in orders %}

<tr>
<td>{{ order.id }}</td>
<td>{{ order.created }}</td>
<td>₹{{ order.total_price }}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
