{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>User Profile | DineTime</title>
<link rel="stylesheet" href="{% static 'css/profile.css' %}">
</head>

<body>

<div class="profile-container">

    <div class="profile-card">

        <div class="profile-left">
            <img src="{% static 'images/user.png' %}" class="profile-img">

            <h2>{{ user.username }}</h2>
            <p>{{ user.email }}</p>

            <a href="#" class="edit-btn">Edit Profile</a>
        </div>

        <div class="profile-right">

            <h3>Personal Information</h3>

            <div class="info">
                <label>Username</label>
                <p>{{ user.username }}</p>
            </div>

            <div class="info">
                <label>Email</label>
                <p>{{ user.email }}</p>
            </div>

            <div class="info">
                <label>Phone</label>
                <p>{{ profile.phone }}</p>
            </div>

            <div class="info">
                <label>Address</label>
                <p>{{ profile.address }}</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>
